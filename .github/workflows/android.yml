name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Unzip Project Files
      run: |
        unzip -qq -o "*.zip" -d unzipped_project

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: './unzipped_project/package-lock.json'

    - name: Install Dependencies
      run: |
        cd unzipped_project
        npm install --legacy-peer-deps

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Android Folder and Build
      run: |
        cd unzipped_project
        if [ -d "android" ]; then
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
        else
          echo "No pre-configured build script found. Attempting alternative build..."
          npx expo prebuild --platform android || true
          cd android && chmod +x gradlew && ./gradlew assembleDebug
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: myraa-app-apk
        path: |
          **/build/outputs/apk/debug/*.apk
