name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Unzip Project Files
      run: unzip -qq -o "*.zip" -d unzipped_project

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Scan, Configure, and Build Android Project
      run: |
        # Dynamically find the real Android settings file
        SETTINGS_PATH=$(find . -name "settings.gradle" -o -name "settings.gradle.kts" -print -quit)
        if [ -z "$SETTINGS_PATH" ]; then
          echo "Error: Could not locate a valid Android project settings file!"
          exit 1
        fi
        
        ANDROID_DIR=$(dirname "$SETTINGS_PATH")
        echo "Found actual Android project directory at: $ANDROID_DIR"
        cd "$ANDROID_DIR"
        
        # Invalidate conflicting configurations and inject Gradle wrapper tool
        rm -f gradlew gradlew.bat
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: myraa-app-apk
        path: |
          **/build/outputs/apk/debug/*.apk
