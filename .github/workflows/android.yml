name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Dynamically Find and Unzip Project
      run: |
        ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" -print -quit)
        if [ -z "$ZIP_FILE" ]; then
          echo "Error: No .zip file found in the root directory!"
          ls -la
          exit 1
        fi
        echo "Found zip file: $ZIP_FILE"
        mkdir -p unzipped_project
        unzip -qq -o "$ZIP_FILE" -d unzipped_project

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Run Android Build
      run: |
        GRADLEW_PATH=$(find . -name "gradlew" -print -quit)
        if [ -z "$GRADLEW_PATH" ]; then
          echo "Error: gradlew file not found anywhere inside the unzipped project!"
          find . -maxdepth 3
          exit 1
        fi
        PROJECT_DIR=$(dirname "$GRADLEW_PATH")
        echo "Found project directory at: $PROJECT_DIR"
        cd "$PROJECT_DIR"
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: myraa-app-apk
        path: |
          **/build/outputs/apk/debug/*.apk
