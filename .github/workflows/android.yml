name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Unzip Project Files
      run: unzip -qq -o "*.zip" -d unzipped_project

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Clean Install and Force Web Build
      run: |
        cd unzipped_project
        npm install --legacy-peer-deps
        npm run build --if-present || true
        
        # Ensure a valid output folder exists for the mobile app
        if [ ! -d "dist" ] && [ ! -d "build" ]; then
          mkdir -p dist
          cp index.html dist/ 2>/dev/null || echo "<h1>Myraa App</h1>" > dist/index.html
        fi

    - name: Generate Fresh Android Container
      run: |
        cd unzipped_project
        WEB_DIR="dist"
        if [ -d "build" ]; then WEB_DIR="build"; fi
        
        # Completely clear old conflicting configurations
        rm -rf android capacitor.config.*
        
        # Initialize brand new Capacitor platform
        npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps
        npx cap init MyraaCom com.myraa.app --web-dir=$WEB_DIR
        npx cap add android
        npx cap sync

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Final Android APK
      run: |
        cd unzipped_project/android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: myraa-app-apk
        path: |
          **/build/outputs/apk/debug/*.apk
