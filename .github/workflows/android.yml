name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Unzip Project Files
      run: unzip -qq -o "*.zip" -d unzipped_project

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Setup Android Container Safely
      run: |
        cd unzipped_project
        npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps
        mkdir -p dist
        cp index.html dist/ 2>/dev/null || echo "<h1>Myraa App</h1>" > dist/index.html
        npx cap init MyraaCom com.myraa.app --web-dir=dist --success
        npx cap add android
        npx cap sync

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Final Android APK
      run: |
        cd unzipped_project/android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: myraa-app-apk
        path: |
          **/build/outputs/apk/debug/*.apk
